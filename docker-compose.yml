version: '3.8'
services:

  redis:
    image: redis:alpine
    container_name: redis_shared
    volumes:
      - ./data/redis:/data
    networks:
      - whatsapp-network
    restart: unless-stopped

  whatsapp-manager:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-manager
    restart: unless-stopped
    ports:
      - "8000-8999:8000-8999"
      - "9000-9999:9000-9999"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./whatsapp-data:/opt/whatsapp-data
      - ./logs:/app/logs
    environment:
      - AppSettings__Supabase__Url=${SUPABASE_URL}
      - AppSettings__Supabase__Key=${SUPABASE_KEY}
      - AppSettings__Host__HostName=${HOST_NAME:-host-1}
      - AppSettings__Host__IpAddress=${HOST_IP:-0.0.0.0}
      - AppSettings__Host__ExternalIp=${EXTERNAL_IP:-}
      - AppSettings__Docker__DataBasePath=/opt/whatsapp-data
      - TZ=Asia/Jerusalem
    depends_on:
      - redis
    networks:
      - whatsapp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  whatsapp-network:
    name: whatsapp_network
    driver: bridge